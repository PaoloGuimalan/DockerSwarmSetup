version: "3.8"
services:
  neon-remote:
    image: johnpauloramil187/neonremote-ui:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.constraint-label=traefik-public"
        - "traefik.http.routers.neonremote.rule=Host(`remote.neonsystems.net`)"
        - "traefik.http.routers.neonremote.entrypoints=websecure"
        - "traefik.http.routers.neonremote.tls.certresolver=letsencrypt"
        - "traefik.http.services.neonremote.loadbalancer.server.port=3006"
        - "traefik.docker.network=traefik-public"
    networks:
      - traefik-public

networks:
  traefik-public:
    external: true
    name: traefik-public
