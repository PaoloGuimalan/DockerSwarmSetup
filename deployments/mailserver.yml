version: "3.8"

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    hostname: mail.neonsystems.net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.constraint-label=traefik-public"
        - "traefik.http.routers.mailserver-certs.rule=Host(`mail.neonsystems.net`)"
        - "traefik.http.routers.mailserver-certs.entrypoints=websecure"
        - "traefik.http.routers.mailserver-certs.tls.certresolver=letsencrypt" # Matches your other services
        - "traefik.http.services.mailserver-certs.loadbalancer.server.port=993"
        - "traefik.docker.network=traefik-public"
    ports:
      - "25:25" # SMTP (Incoming Mail from other servers)
      - "587:587" # SMTP (Outgoing Mail from Outlook - STARTTLS)
      - "465:465" # SMTP (Outgoing Mail from Outlook - SSL/TLS)
      - "993:993" # IMAP (Incoming Mail for Outlook - REQUIRED)
    volumes:
      - /data/mailserver-data:/var/mail
      - /data/mailserver-state:/var/mail-state
      - /data/mailserver-config:/tmp/docker-mailserver
      - /data/mailserver-certs:/etc/letsencrypt:ro
    environment:
      - DMS_DEBUG=0
      - PERMIT_DOCKER=host
      - POSTMASTER_ADDRESS=postmaster@neonsystems.net
      - ENABLE_AMAVIS=0
      - ENABLE_CLAMAV=0
      - ENABLE_SPAMASSASSIN=0
      - OVERRIDE_HOSTNAME=mail.neonsystems.net
      - SSL_TYPE=manual
      # Point to the certificate folder that already exists (neonsystems.net)
      - SSL_CERT_PATH=/etc/letsencrypt/mail.neonsystems.net/fullchain.pem
      - SSL_KEY_PATH=/etc/letsencrypt/mail.neonsystems.net/privkey.pem
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE

  cert-dumper:
    image: ldez/traefik-certs-dumper:latest
    deploy:
      placement:
        constraints:
          - node.role == manager
    volumes:
      - /var/lib/docker/volumes/traefik_traefik_data/_data/acme.json:/app/acme.json:ro
      - /data/mailserver-certs:/app/output
    command: >
      file --watch 
      --version v3
      --source /app/acme.json 
      --dest /app/output 
      --domain-subdir 
      --crt-name fullchain --crt-ext .pem 
      --key-name privkey --key-ext .pem
