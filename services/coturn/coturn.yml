version: "3.8"
services:
  coturn:
    image: coturn/coturn:latest
    networks:
      - host
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

networks:
  host:
    external: true
    name: host
